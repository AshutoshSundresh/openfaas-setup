# Strategic-merge patch applied after `faas-cli deploy` to add:
#   1. terminationGracePeriodSeconds — gives the wrapper time to dump + push before SIGKILL
#   2. POD_UID via Downward API — wrapper and JVM use this as the Redis key discriminator
#   3. emptyDir volume for MDOX profile checkpoint files
#
# Usage:
#   kubectl patch deployment profile-fn -n openfaas-fn \
#     --patch-file k8s/function-patch.yaml
spec:
  template:
    spec:
      terminationGracePeriodSeconds: 20
      volumes:
        - name: profiles
          emptyDir: {}
      containers:
        - name: profile-fn
          env:
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
          volumeMounts:
            - name: profiles
              mountPath: /profiles
